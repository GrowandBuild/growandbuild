<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teste PWA - Meus Produtos</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Meus Produtos">
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/images/icon-192x192.png">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            font-weight: 600;
        }
        .success { background: rgba(16, 185, 129, 0.2); }
        .error { background: rgba(239, 68, 68, 0.2); }
        .warning { background: rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📱 Teste PWA - Meus Produtos</h1>
            <p>Verificando se o PWA está pronto para instalação...</p>
            
            <div id="status"></div>
            
            <button id="installBtn" class="btn" style="display: none;">
                📥 Instalar App
            </button>
            
            <button id="testBtn" class="btn">
                🔍 Verificar Status PWA
            </button>
            
            <button id="forceBtn" class="btn">
                ⚡ Forçar Instalação
            </button>
        </div>
        
        <div class="card">
            <h3>📋 Critérios PWA:</h3>
            <ul id="criteria" style="text-align: left;">
                <li>✅ Servido via HTTPS</li>
                <li>✅ Service Worker registrado</li>
                <li>✅ Manifest.json válido</li>
                <li>✅ Ícones disponíveis</li>
                <li>✅ Não já instalado</li>
            </ul>
        </div>
    </div>

    <script>
        let deferredPrompt;
        let installButton = document.getElementById('installBtn');
        let statusDiv = document.getElementById('status');
        let criteriaDiv = document.getElementById('criteria');

        // Verificar status PWA
        function checkPWAStatus() {
            let status = [];
            
            // HTTPS check
            const isHttps = location.protocol === 'https:' || location.hostname === 'localhost';
            status.push(`HTTPS: ${isHttps ? '✅' : '❌'} (${location.protocol})`);
            
            // Service Worker check
            if ('serviceWorker' in navigator) {
                status.push('Service Worker: ✅ Suportado');
            } else {
                status.push('Service Worker: ❌ Não suportado');
            }
            
            // Manifest check
            fetch('/manifest.json')
                .then(response => {
                    if (response.ok) {
                        status.push('Manifest: ✅ Acessível');
                    } else {
                        status.push('Manifest: ❌ Erro');
                    }
                    updateStatus(status);
                })
                .catch(() => {
                    status.push('Manifest: ❌ Erro');
                    updateStatus(status);
                });
            
            // PWA mode check
            const isPWA = window.matchMedia('(display-mode: standalone)').matches;
            status.push(`Modo PWA: ${isPWA ? '✅ Sim' : '❌ Não'}`);
            
            updateStatus(status);
        }

        function updateStatus(status) {
            statusDiv.innerHTML = status.map(s => `<div class="status ${s.includes('✅') ? 'success' : 'error'}">${s}</div>`).join('');
        }

        // Detectar prompt de instalação
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installButton.style.display = 'inline-block';
            showStatus('Prompt de instalação detectado! 🎉', 'success');
        });

        // Botão de instalação
        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) {
                showStatus('Prompt não disponível', 'error');
                return;
            }
            
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                showStatus('PWA instalado com sucesso! 🎉', 'success');
                installButton.style.display = 'none';
            } else {
                showStatus('Instalação cancelada', 'warning');
            }
            
            deferredPrompt = null;
        });

        // Botão de teste
        document.getElementById('testBtn').addEventListener('click', checkPWAStatus);

        // Botão forçar
        document.getElementById('forceBtn').addEventListener('click', () => {
            // Registrar Service Worker manualmente
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        showStatus('Service Worker registrado manualmente! ✅', 'success');
                        console.log('SW registrado:', registration);
                    })
                    .catch(error => {
                        showStatus('Erro ao registrar SW: ' + error, 'error');
                    });
            }
            
            // Forçar verificação do manifest
            fetch('/manifest.json')
                .then(response => response.json())
                .then(manifest => {
                    showStatus('Manifest carregado: ' + manifest.name, 'success');
                })
                .catch(error => {
                    showStatus('Erro no manifest: ' + error, 'error');
                });
        });

        function showStatus(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
            
            setTimeout(() => {
                div.remove();
            }, 5000);
        }

        // Verificar ao carregar
        checkPWAStatus();
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registrado:', registration);
                    })
                    .catch(error => {
                        console.error('Erro SW:', error);
                    });
            });
        }
    </script>
</body>
</html>
